steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - VITE_API_BASE_URL=https://votewise-backend-666959845001.us-central1.run.app
      - -t
      - us-central1-docker.pkg.dev/votewise-494715/votewise-repo/frontend:latest
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/votewise-494715/votewise-repo/frontend:latest
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - votewise-frontend
      - --image=us-central1-docker.pkg.dev/votewise-494715/votewise-repo/frontend:latest
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
