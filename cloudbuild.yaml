# cloudbuild.yaml
# Auto-deploys VoteWise as a monolithic service on Google Cloud Run
# Pipeline: test → build → push → deploy (Single Service)

substitutions:
  _REGION: us-central1
  _REPO: us-central1-docker.pkg.dev/votewise-494715/votewise-repo

steps:

  # ── Step 1: Run backend tests ──────────────────────────────────────────────
  - name: python:3.11-slim
    id: test-backend
    entrypoint: bash
    args:
      - -c
      - |
        cd backend
        pip install -r requirements.txt -q
        pytest tests/ -v --tb=short

  # ── Step 2: Build Monolithic Docker image ──────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-image
    waitFor: [test-backend]
    args:
      - build
      - -t
      - $_REPO/monolith:$COMMIT_SHA
      - -t
      - $_REPO/monolith:latest
      - .

  # ── Step 3: Push image to Artifact Registry ────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-image
    waitFor: [build-image]
    args:
      - push
      - --all-tags
      - $_REPO/monolith

  # ── Step 4: Deploy to Cloud Run (Single Service) ───────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push-image]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - votewise-ai
      - --image=$_REPO/monolith:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest
      - --set-env-vars=GEMINI_MODEL=gemini-2.5-flash,GEMINI_ENDPOINT=https://generativelanguage.googleapis.com/v1beta/openai/chat/completions,ALLOWED_ORIGINS=*

# Store built images in Artifact Registry
images:
  - $_REPO/monolith:$COMMIT_SHA
  - $_REPO/monolith:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
