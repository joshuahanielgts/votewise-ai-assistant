    <!-- Primary Meta Tags -->
    <title>VoteWise — Your AI Guide to Indian Elections & Democracy</title>

    <meta name="description" content="VoteWise is an AI-powered assistant dedicated to helping Indian citizens understand voter registration, Lok Sabha elections, ECI guidelines, and the democratic process in simple language." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://votewise.in" />
    <meta property="og:title" content="VoteWise — Empowering Indian Voters with AI" />
    <meta property="og:description" content="Get instant, non-partisan answers about voter registration, polling booth procedures, and your voting rights in India." />
    <meta property="og:image" content="https://votewise.in/favicon.ico" />
    <meta property="og:site_name" content="VoteWise" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />

    <meta property="twitter:title" content="VoteWise — AI Civic Education for India" />
    <meta property="twitter:description" content="Clear, friendly, and expert guidance on the Indian election process. Powered by AI." />
    <meta property="twitter:image" content="https://votewise.in/favicon.ico" />

    <!--
      FAVICON — two tags are both required:

      1. rel="icon" svg  → tells modern browsers (Chrome 80+, Firefox, Edge, Safari 9+)
                           to use your SVG. This is the icon that actually shows in the tab.

      2. rel="icon" data:, → This is the key fix for the favicon.ico 404.
                             Browsers automatically fire a GET /favicon.ico as a
                             legacy fallback regardless of any other icon link.
                             Setting a second <link rel="icon"> with href="data:,"
                             overrides that legacy slot with an empty inline resource,
                             so the browser never makes the network request at all.
                             The SVG tag above still wins for the visible tab icon.
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="icon" href="data:," />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <meta name="theme-color" content="#1a365d" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Prevent FOUC — matches your dark theme bg -->
    <style>
      body {
        margin: 0;
        background-color: #030712;
        color: #f9fafb;
        font-family: 'Outfit', sans-serif;
      }
      #root { min-height: 100vh; }
    </style>
